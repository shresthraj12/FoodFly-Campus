services:
  mongodb:
    image: mongo:latest
    container_name: foodfly_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - foodfly_network

  backend:
    build: ./backend
    container_name: foodfly_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/foodfly
      - JWT_SECRET=supersecretfoodflyjwtkey2024
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - foodfly_network

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost:5000
    container_name: foodfly_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - foodfly_network

  nginx:
    image: nginx:alpine
    container_name: foodfly_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend
    networks:
      - foodfly_network

  prometheus:
    image: prom/prometheus:latest
    container_name: foodfly_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - foodfly_network

  grafana:
    image: grafana/grafana:latest
    container_name: foodfly_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - foodfly_network

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: foodfly_cadvisor
    restart: unless-stopped
    expose:
      - 8080
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - foodfly_network

  node-exporter:
    image: prom/node-exporter:latest
    container_name: foodfly_node_exporter
    restart: unless-stopped
    expose:
      - 9100
    networks:
      - foodfly_network

  jenkins:
    image: jenkins/jenkins:lts
    container_name: foodfly_jenkins
    restart: unless-stopped
    ports:
      - "8081:8080"
      - "50000:50000"
    volumes:
      - jenkins_data:/var/jenkins_home
    networks:
      - foodfly_network

volumes:
  mongodb_data:
  jenkins_data:

networks:
  foodfly_network:
    driver: bridge
